name: GoodGuyBadGuy
options:
  bundleIdPrefix: com.clawd
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: 3.31.3
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface
    from: 0.9.0
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: 1.3.0

targets:
  GoodGuyBadGuy:
    type: application
    platform: iOS
    sources:
      - GoodGuyBadGuy
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXVLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-transformers
        product: Tokenizers
    info:
      path: GoodGuyBadGuy/Info.plist
      properties:
        CFBundleDisplayName: Good Guy?
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        # Permission strings for the identifier's tools + voice input.
        # iOS shows these in the grant dialog the first time each is used.
        NSMicrophoneUsageDescription: >-
          Voice input: dictate questions instead of typing.
        NSSpeechRecognitionUsageDescription: >-
          Transcribes your voice to text entirely on this device.
        NSCameraUsageDescription: >-
          Take a photo of a creature or plant so the on-device model can tell
          you if it's dangerous. Photos never leave your phone.
        NSLocationWhenInUseUsageDescription: >-
          Lets the identifier narrow species down by region (a "brown snake"
          means different things in Texas vs. Australia). Location never
          leaves your phone.
    entitlements:
      path: GoodGuyBadGuy/GoodGuyBadGuy.entitlements
      properties:
        # Lets iOS grant the app more RAM than the default per-app ceiling —
        # needed headroom for the model weights + KV cache.
        com.apple.developer.kernel.increased-memory-limit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clawd.goodguybadguy
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
